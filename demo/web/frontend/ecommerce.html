<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 py-10 px-4">
    <div class="max-w-3xl mx-auto space-y-8">
        
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-semibold text-gray-900 tracking-tight">Loja</h1>
                    <p class="text-xs text-gray-500">Vendas</p>
                </div>
            </div>
            <a href="/" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Menu
            </a>
        </div>

        <div class="grid gap-6 md:grid-cols-2 items-start">
            <!-- Cadastro -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="text-base font-semibold text-gray-900 mb-5">Nova Venda</h2>
                <form action="/cadastrar_pedido" method="POST" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Produto Vendido</label>
                        <input type="text" name="produto" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Cartão de Crédito</label>
                        <input type="text" name="cartao" placeholder="0000 0000 0000 0000" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Valor Total (R$)</label>
                        <input type="number" step="0.01" name="valor" placeholder="0.00" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-xl text-sm transition-colors">
                            Processar Pagamento
                        </button>
                    </div>
                </form>
            </div>

            <!-- Busca -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="text-base font-semibold text-gray-900 mb-5">Consultar Vendas</h2>
                <form action="/buscar_pedido" method="GET" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">Buscar por Produto</label>
                        <input type="text" name="produto" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 font-medium py-2.5 px-4 rounded-xl text-sm transition-colors shadow-sm">
                            Pesquisar Histórico
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
